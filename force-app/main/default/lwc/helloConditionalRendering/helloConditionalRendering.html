<template>
    <lightning-card title="Conditional Rendering">
        <div class="slds-var-m-around_medium">
            <lightning-button variant="brand" 
                              label="Show Data" 
                              title="Show Data" 
                              onclick={handleClick}
                              class="slds-m-left_x-small"> </lightning-button>

                              <template if:true={isVisible}>
                                    <div>Welcome to Zero Serious</div>
                              </template>  

                              <template if:false={isVisible}>
                                    <div>you can't see data. Please click the buttton</div>
                              </template>  

                              <lightning-input type="text"
                                                label="type hello to see the data"
                                                onkeyup={ChangeHandler}>

                              </lightning-input>
                              <template if:true={helloMethod}>
                                <div>Hurrr...! You got the value</div>
                              </template>
                           
        </div>
    </lightning-card> 
</template>
